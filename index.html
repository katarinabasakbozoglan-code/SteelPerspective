<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Perspective | Endüstriyel Analiz & Mühendislik Notları</title>
    <style>
        /* Gradyan ve Elegant Renk Paleti Tasarımı */
        :root {
            --bg-dark: #120e16;       /* Derin koyu mor/siyah arka plan */
            --panel-dark: #1e1924;    /* Kartlar ve paneller için koyu mor */
            --accent-purple: #8e44ad; /* Canlı elegant mor */
            --neon-pink: #e84393;     /* Görseldeki join now / vurgu pembesi */
            --text-light: #f5f6fa;    /* Net okunabilir açık gri metin */
            --text-muted: #b2bec3;    /* İkincil teknik detay yazıları */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Arka Plandaki Akıcı Dalga Efektleri (CSS Gradient Art) */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 600px;
            background: radial-gradient(circle at 80% 20%, rgba(232, 67, 147, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(142, 68, 173, 0.2) 0%, transparent 60%);
            z-index: -1;
        }

        /* Navigasyon Barı */
        header {
            background: rgba(30, 25, 36, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(142, 68, 173, 0.3);
            padding: 1.2rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(45deg, #ffffff, var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: all 0.3s;
            cursor: pointer;
            padding: 0.5rem 0.2rem;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-light);
            border-bottom: 2px solid var(--neon-pink);
        }

        /* Kahraman (Hero) Bölümü */
        .hero {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            font-weight: 800;
        }

        .hero-text h1 span {
            background: linear-gradient(135deg, var(--accent-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            text-align: justify;
        }

        .btn-join {
            background: linear-gradient(90deg, var(--neon-pink), var(--accent-purple));
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 67, 147, 0.6);
        }

        /* İnteraktif Sayfa Panelleri (Tabs) */
        .page-content {
            display: none; /* Varsayılan olarak gizli */
            max-width: 1200px;
            margin: 0 auto 4rem auto;
            padding: 0 2rem;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .page-content.active-page {
            display: block; /* Sadece aktif olan görünecek */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Kart Yapıları */
        .glass-panel {
            background: var(--panel-dark);
            border: 1px solid rgba(142, 68, 173, 0.2);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--neon-pink);
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Yazılarım Kısmı İçin Alt Kartlar */
        .article-node {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--accent-purple);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 0 8px 8px 0;
            transition: all 0.3s;
        }

        .article-node:hover {
            background: rgba(142, 68, 173, 0.08);
            border-left-color: var(--neon-pink);
            transform: translateX(5px);
        }

        .article-meta {
            font-size: 0.85rem;
            color: var(--neon-pink);
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .article-node h3 {
            margin-bottom: 0.5rem;
            color: #fff;
        }

        /* Footer */
        footer {
            background: #0b080e;
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(142, 68, 173, 0.2);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Sağdaki Küçük Grafik Paneli (Görseldeki havayı desteklemek için) */
        .side-graphic {
            background: linear-gradient(135deg, rgba(30, 25, 36, 0.6), rgba(142, 68, 173, 0.1));
            border: 1px solid rgba(232, 67, 147, 0.2);
            height: 350px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .circle-deco {
            width: 150px;
            height: 150px;
            border: 2px dashed var(--neon-pink);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate { group { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; text-align: center; margin: 2rem auto; }
            .side-graphic { display: none; }
            .nav-links { gap: 15px; }
            .hero-text h1 { font-size: 2.2
